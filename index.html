<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Audiobook Reader</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
  body {
    font-family: -apple-system, sans-serif;
    padding: 20px;
    background: #f2f2f2;
  }

  h1 {
    font-size: 20px;
  }

  button {
    padding: 10px 14px;
    margin: 5px 3px;
    border: none;
    border-radius: 8px;
    background: black;
    color: white;
    font-size: 14px;
  }

  button:disabled {
    background: gray;
  }

  input[type="range"] {
    width: 100%;
  }

  #status {
    margin-top: 10px;
    font-size: 14px;
  }

  #textPreview {
    margin-top: 15px;
    max-height: 180px;
    overflow: auto;
    background: white;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
  }
</style>
</head>

<body>

<h1>📖 PDF Audiobook (Local)</h1>

<input type="file" id="fileInput" accept="application/pdf"><br><br>

<button onclick="readPDF()">Load PDF</button>
<button onclick="startReading()">▶ Play</button>
<button onclick="pauseReading()">⏸ Pause</button>
<button onclick="resumeReading()">⏯ Resume</button>
<button onclick="stopReading()">⏹ Stop</button>

<br><br>

<label>Speed: <span id="speedValue">1x</span></label>
<input type="range" id="speed" min="0.3" max="3" step="0.1" value="1">

<br><br>

<label>Voice:</label>
<select id="voiceSelect"></select>

<div id="status">Status: Idle</div>

<div id="textPreview"></div>

<script>
let fullText = "";
let chunks = [];
let currentChunkIndex = 0;
let isPaused = false;

const statusEl = document.getElementById("status");
const previewEl = document.getElementById("textPreview");
const voiceSelect = document.getElementById("voiceSelect");


// SPEED DISPLAY
const speedSlider = document.getElementById("speed");
const speedValue = document.getElementById("speedValue");

speedSlider.oninput = () => {
  speedValue.textContent = speedSlider.value + "x";
};


// LOAD VOICES + AUTO SELECT SAMANTHA
function loadVoices() {
  const voices = speechSynthesis.getVoices();
  voiceSelect.innerHTML = "";

  let samanthaIndex = 0;

  voices.forEach((voice, index) => {
    const option = document.createElement("option");
    option.value = index;
    option.textContent = voice.name;

    if (voice.name.toLowerCase().includes("samantha")) {
      samanthaIndex = index;
    }

    voiceSelect.appendChild(option);
  });

  voiceSelect.value = samanthaIndex;
}

speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();


// READ PDF
async function readPDF() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return alert("Select a PDF");

  statusEl.textContent = "Status: Reading PDF...";

  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

  fullText = "";

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();

    const strings = content.items.map(item => item.str);
    fullText += strings.join(" ") + "\n\n";
  }

  previewEl.textContent = fullText.slice(0, 1000) + "...";

  prepareChunks(fullText);

  statusEl.textContent = "Status: Ready to play";
}


// BETTER CHUNKING (sentence-based)
function prepareChunks(text) {
  const sentences = text.match(/[^\.!\?]+[\.!\?]+/g) || [text];

  chunks = [];
  let current = "";

  sentences.forEach(sentence => {
    if ((current + sentence).length > 280) {
      chunks.push(current);
      current = sentence;
    } else {
      current += sentence;
    }
  });

  if (current) chunks.push(current);

  currentChunkIndex = 0;
}


// START
function startReading() {
  stopReading();
  isPaused = false;
  speakChunk();
}


// SPEAK
function speakChunk() {
  if (currentChunkIndex >= chunks.length) {
    statusEl.textContent = "Status: Finished";
    return;
  }

  if (isPaused) return;

  const utterance = new SpeechSynthesisUtterance(chunks[currentChunkIndex]);

  const voices = speechSynthesis.getVoices();
  utterance.voice = voices[voiceSelect.value];

  utterance.rate = parseFloat(speedSlider.value);
  utterance.pitch = 1;
  utterance.volume = 1;

  utterance.onend = () => {
    currentChunkIndex++;
    speakChunk();
  };

  speechSynthesis.speak(utterance);

  statusEl.textContent =
    `Reading ${currentChunkIndex + 1} / ${chunks.length}`;
}


// CONTROLS
function pauseReading() {
  speechSynthesis.pause();
  isPaused = true;
  statusEl.textContent = "Status: Paused";
}

function resumeReading() {
  isPaused = false;
  speechSynthesis.resume();
  statusEl.textContent = "Status: Resumed";
}

function stopReading() {
  speechSynthesis.cancel();
  currentChunkIndex = 0;
  statusEl.textContent = "Status: Stopped";
}

</script>

</body>
</html>
